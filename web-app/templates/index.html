<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ocean_pulse</title>
    <link rel="stylesheet" href="static/styles.css">
</head>

<body>
    <h1>ATTENTION TRACKER</h1>

    <img src="{{ url_for('static', filename='assets/WatchingYou.png') }}" id="leftImg" class="side-img">
    <img src="{{ url_for('static', filename='assets/WatchingYou.png') }}" id="rightImg" class="side-img">

    <div id="container">
        <div>
            <video id="webcamVideo" autoplay playsinline></video>

            <div class="btn-row">
                <button id="startBtn" class="btn">START SESSION</button>
                <button id="endBtn" class="btn">END SESSION</button>
            </div>

            <canvas id="captureCanvas" hidden></canvas>
        </div>

        <button id="openGalleryBtn" class="btn wide-btn">
            View Moments of Distraction (<span id="counter">0</span>)
        </button>

        <div id="drawer" class="drawer">
            <div id="images" class="images-grid"></div>
        </div>

        <div id="drawerOverlay" class="overlay"></div>
    </div>

    <div id="lightbox" class="lightbox">
        <img id="lightboxImg" />
    </div>

    <script src="{{ url_for('static', filename='capture.js') }}"></script>

    <script>
        const leftImg = document.getElementById("leftImg");
        const rightImg = document.getElementById("rightImg");

        const video = document.getElementById("webcamVideo");
        const startBtn = document.getElementById("startBtn");
        const endBtn = document.getElementById("endBtn");
        const openBtn = document.getElementById("openGalleryBtn");

        const drawer = document.getElementById("drawer");
        const overlay = document.getElementById("drawerOverlay");

        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");

        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });

                video.srcObject = stream;
            } catch (err) {
                console.error("Camera error:", err);
                alert("Camera access denied or not available.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.srcObject = null;
            stream = null;
        }

        startBtn.addEventListener("click", async () => {
            try {
                await fetch("/api/start-session", { method: "POST" });

                startBtn.disabled = true;
                endBtn.disabled = false;

                showSides();

                console.log("Session started");
            } catch (err) {
                console.error(err);
            }
        });

        endBtn.addEventListener("click", async () => {
            try {
                await fetch("/api/end-session", { method: "POST" });
                await fetch("/api/reset-session", { method: "POST" });

                startBtn.disabled = false;
                endBtn.disabled = true;
                updateImages();

                hideSides();

                console.log("Session stopped & cleared");
            } catch (err) {
                console.error(err);
            }
        });

        function openDrawer() {
            drawer.classList.add("open");
            overlay.classList.add("show");
        }

        function closeDrawer() {
            drawer.classList.remove("open");
            overlay.classList.remove("show");
        }

        function showSides() {
            leftImg.classList.add("show");
            rightImg.classList.add("show");
        }

        function hideSides() {
            leftImg.classList.remove("show");
            rightImg.classList.remove("show");
        }

        openBtn.addEventListener("click", openDrawer);
        overlay.addEventListener("click", closeDrawer);

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add("show");
        }

        function closeLightbox() {
            lightbox.classList.remove("show");
            lightboxImg.src = "";
        }

        lightbox.addEventListener("click", closeLightbox);

        async function updateImages() {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();

                document.getElementById("counter").textContent =
                    data.attention_counter ?? 0;

                const container = document.getElementById("images");

                container.innerHTML = data.records.map(r => `
                    <div>
                        <img 
                            src="/images/${r._id}" 
                            class="gallery-img"
                            onclick="openLightbox('/images/${r._id}')"
                        />
                        <p>${r.timestamp || 'N/A'}</p>
                    </div>
                `).join("");

            } catch (err) {
                console.error("Update failed:", err);
            }
        }

        window.addEventListener("DOMContentLoaded", () => {
            startCamera();

            startBtn.disabled = false;
            endBtn.disabled = true;

            updateImages();
            setInterval(updateImages, 2000);
        });

        window.addEventListener("beforeunload", stopCamera);
    </script>
</body>
</html>
