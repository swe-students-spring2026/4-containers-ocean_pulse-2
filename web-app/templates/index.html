<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ocean_pulse</title>
    <link rel="stylesheet" href="static/styles.css">
</head>

<body>
    <h1>ocean_pulse's attention tracker</h1>

    <div id="data">
        <span>times attention lost:</span>
        <span class="important" id="counter">0</span>
    </div>

    <div id="container">
        <div>
            <button id="toggleCamera">Start Camera</button>
            <video id="webcamVideo" autoplay playsinline></video>
            <canvas id="captureCanvas" hidden></canvas>
        </div>

        <div id="imagesSection">
            <h2>attention loss captured</h2>
            <div id="images"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById("webcamVideo");
        const button = document.getElementById("toggleCamera");

        let stream = null;
        let cameraOn = false;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });

                video.srcObject = stream;
                cameraOn = true;
                button.textContent = "Stop Camera";

            } catch (err) {
                console.error("Could not access webcam:", err);
                alert("Camera access denied or not available.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            video.srcObject = null;
            stream = null;
            cameraOn = false;
            button.textContent = "Start Camera";
        }

        button.addEventListener("click", () => {
            cameraOn ? stopCamera() : startCamera();
        });

        window.addEventListener("beforeunload", stopCamera);
    </script>

    <script src="{{ url_for('static', filename='capture.js') }}"></script>

    <script>
        async function updateImages() {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();

                document.getElementById("counter").textContent =
                    data.attention_counter ?? 0;

                const container = document.getElementById("images");

                container.innerHTML = data.records.map(r => `
                    <div>
                        <img src="/images/${r._id}">
                        <p>${r.timestamp || 'N/A'}</p>
                    </div>
                `).join("");

            } catch (err) {
                console.error("update failed:", err);
            }
        }

        updateImages();
        setInterval(updateImages, 2000);
    </script>

</body>
</html>
